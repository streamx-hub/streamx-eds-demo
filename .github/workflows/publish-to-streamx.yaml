name: streamx-publish

on:
  workflow_dispatch:
    inputs:
      publish_all_webresources:
        type: boolean
        default: false

  repository_dispatch:
    types:
      - resource-published

jobs:
  publish-to-streamx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare variables
        id: vars
        shell: bash
        run: |

          EDS_DOMAIN="${{ vars.EDS_DOMAIN_URL }}"
          EDS_DOMAIN="${EDS_DOMAIN%/}"
          echo "eds_domain=$EDS_DOMAIN" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            path="${{ github.event.client_payload.path }}"
            streamx_key=$(echo "$path" | sed 's/\.md$//')
            page_path=$(echo "$streamx_key" | sed 's/index//')

            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "path=$path" >> $GITHUB_OUTPUT
            echo "streamx_key=$streamx_key" >> $GITHUB_OUTPUT
            echo "page_path=$page_path" >> $GITHUB_OUTPUT
          else
            # publish all lub fullsync -> zawsze lokalne pliki
            echo "mode=fullsync" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        shell: bash
        env:
          INGESTION_URL: ${{ vars.STREAMX_INGESTION_URL }}
          TOKEN: ${{ secrets.STREAMX_INGESTION_GH_TOKEN }}
          EDS_DOMAIN: ${{ steps.vars.outputs.eds_domain }}
          INCLUDE_PATTERNS: ${{ vars.STREAMX_INGESTION_INCLUDES }}
        run: |

          publish () {
            SUBJECT=$1
            BASE64_CONTENT=$2
            EVENT_TYPE=$3
            CONTENT_TYPE=$4

            MAX_RETRIES=5
            RETRY_DELAY=2
            SUCCESS=0

            for i in $(seq 1 $MAX_RETRIES); do
              RESPONSE=$(curl --http1.1 \
                              --connect-timeout 10 --max-time 60 -s -w "%{http_code}" \
                              -X POST "${INGESTION_URL}/ingestion/v2/cloudevents" \
                              -H "Authorization: Bearer ${TOKEN}" \
                              -H "Content-Type: application/cloudevents+json" \
                              -d "{
                                \"specversion\":\"1.0\",
                                \"id\":\"$(uuidgen)\",
                                \"source\":\"eds\",
                                \"type\":\"${EVENT_TYPE}\",
                                \"subject\":\"${SUBJECT}\",
                                \"datacontenttype\":\"application/json\",
                                \"sxsource\":\"eds\",
                                \"data\":{
                                  \"content\":\"${BASE64_CONTENT}\",
                                  \"type\":\"${CONTENT_TYPE}\"
                                }
                              }" || echo "000")

              STATUS=${RESPONSE: -3}

              if [[ "$STATUS" == "200" || "$STATUS" == "202" ]]; then
                echo "✅ Ingested ($STATUS) subject=$SUBJECT"
                SUCCESS=1
                break
              else
                echo "⚠️ Attempt $i failed ($STATUS) subject=$SUBJECT"
                sleep $RETRY_DELAY
              fi
            done

            if [[ $SUCCESS -eq 0 ]]; then
              echo "❌ Ingestion failed after $MAX_RETRIES attempts subject=$SUBJECT"
            fi

            # throttling
            sleep 0.5
          }

          MODE="${{ steps.vars.outputs.mode }}"
          echo "Mode: $MODE"

          # ===== Incremental mode (repository_dispatch) =====
          if [[ "$MODE" == "incremental" ]]; then
            PATH_INPUT="${{ steps.vars.outputs.path }}"
            STREAMX_KEY="${{ steps.vars.outputs.streamx_key }}"
            PAGE_URL="${EDS_DOMAIN}${{ steps.vars.outputs.page_path }}"
            PLAIN_URL="${EDS_DOMAIN}${STREAMX_KEY}.plain.html"
            RESOURCE_URL="${EDS_DOMAIN}${PATH_INPUT}"

            if [[ "$PATH_INPUT" == *.md ]]; then
              BASE64_CONTENT=$(curl -fsSL "$PAGE_URL" | base64 | tr -d '\n')
              publish "$STREAMX_KEY" "$BASE64_CONTENT" "com.streamx.blueprints.page.published.v1" "page/eds"

              if [[ "$STREAMX_KEY" == *nav ]] || [[ "$STREAMX_KEY" == *footer ]]; then
                BASE64_CONTENT=$(curl -fsSL "$PLAIN_URL" | base64 | tr -d '\n')
                publish "${STREAMX_KEY}.plain.html" "$BASE64_CONTENT" "com.streamx.blueprints.web-resource.published.v1" "web-resource/static"
              fi
            fi

            if [[ "$PATH_INPUT" == *.json ]]; then
              BASE64_CONTENT=$(curl -fsSL "$RESOURCE_URL" | base64 | tr -d '\n')
              publish "/$PATH_INPUT" "$BASE64_CONTENT" "com.streamx.blueprints.web-resource.published.v1" "web-resource/static"
            fi
          fi

          # ===== Fullsync mode (lokalne pliki) =====
          if [[ "$MODE" == "fullsync" ]]; then
            echo "Running full sync from local files..."

            FILES=$(echo "$INCLUDE_PATTERNS" | jq -r '.[]' | xargs git ls-files)

            for file in $FILES; do
              SUBJECT="/$file"
              BASE64_CONTENT=$(base64 "$file" | tr -d '\n')

              CONTENT_TYPE="web-resource/static"
              EVENT_TYPE="com.streamx.blueprints.web-resource.published.v1"

              if [[ "$file" == *.md ]]; then
                CONTENT_TYPE="page/eds"
                EVENT_TYPE="com.streamx.blueprints.page.published.v1"
              fi

              publish "$SUBJECT" "$BASE64_CONTENT" "$EVENT_TYPE" "$CONTENT_TYPE"
            done
          fi